[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  "node_modules",
  "frontend/node_modules",
  "static",
  "data",
]

[tool.ruff.lint]
select = [
  "E",      # pycodestyle errors
  "F",      # Pyflakes
  "I",      # isort
  "UP",     # pyupgrade
  "B",      # flake8-bugbear
  "SIM",    # flake8-simplify
]
ignore = [
  "B008",   # function call in default arg — normal for FastAPI File/Query/Body
]

[tool.ruff.format]
quote-style = "double"

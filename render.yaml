services:
  - type: web
    name: highlight-reviewer-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    buildCommand: bash scripts/render-build.sh
    startCommand: cd apps/api && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENV
        value: production
